citations:
  - name: "muvis-align"
    license: "GPL 3"
    description: "Image registration"

docker_image:
  org: ccp-volume-em
  name: muvis-align
  tag: "1.0.0"
  platform: "linux/amd64"

inputs:
  - name: input_images
    type: image
    label: "Input images"
    description: "Input images"
    file_count: "multiple"
    unique_string:
      - "*"
    default: "single"
    cli_tag: "--input_images"
    cli_order: 0
    optional: False
    format:
      - tiff
      - ometiff
      - zarr
      - omezarr
    section_id: ""
    folder_name: "/data"
    mode: "beginner"

outputs:
  - name: output_array 
    type: image
    label: "Output Data"
    description: "output data"
    cli_tag: "--output_data"
    cli_order: 1
    default: "single"
    optional: True
    format:
      - omezarr
    folder_name: "/data"
    file_count: "single"
    unique_string:
      - "*"
    section_id: "outputs"
    mode: "beginner"
    depth: True
    timepoints: True
    tiled: True
    pyramidal: True

parameters:
  - name: button_load_metadata
    type: button
    label: "Load Metadata"
    description: "Button to load metadata"
    cli_tag: "--button_load_metadata"
    cli_order: 1
    optional: True
    section_id: "input-args"
    mode: "beginner"
