general:
  overwrite: True
  logging:
    verbose: True
  output:
    format: ome.zarr

operations:
  - operation: register
    input:
      path:
        - data/S000/S000_000_000.ome.zarr
        - data/S001/S001_000_001.ome.zarr
      labels:
        - S000_000_000
        - S001_000_001
      source_metadata: source
      extra_metadata: ../aligned_stitched_mappings1.json
    registration:
      pairing: orthogonal
      transform_type: affine
      method: sift
      gaussian_sigma: 2
      normalisation: True
      max_keypoints: 5000
      inlier_threshold_factor: 0.05
      max_trials: 1000
      ransac_iterations: 3
      metrics: [ncc, ssim, onmi]
    output:
      path: ../../output/stitched/
