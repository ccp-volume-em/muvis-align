general:
  overwrite: True
  logging:
    verbose: False
  output:
    format: ome.zarr

operations:
  - operation: register
    input:
      path:
        - data/2d/S000_000_000.ome.zarr
        - data/2d/S001_000_001.ome.zarr
      labels:
        - S000_000_000
        - S001_000_001
      source_metadata: source
      extra_metadata: ../aligned_stitched_mappings1.json
    registration:
      pairing: orthogonal
      transform_type: rigid
      method: orb
      gaussian_sigma: 2.5
      normalisation: True
      max_keypoints: 5000
      inlier_threshold_factor: 0.05
      max_trials: 1000
      ransac_iterations: 3
      metrics: [ncc, ssim, onmi]
      n_parallel_pairwise_regs: 1
    output:
      path: ../../output/overlay/
