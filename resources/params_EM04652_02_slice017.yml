general:
  show_original: False
  metadata_summary: False
  chunk_size: [10240, 10240]
  break_on_error: True
  logging:
    filename: log/muvis-align-EM04652.log
    format: '%(asctime)s %(levelname)s: %(message)s'
    dask: True
    time: True
    verbose: True
  output:
    clear: False
    overwrite: False
    format: ome.zarr
    ome_version: 0.5
    tile_size: [10240, 10240]
    compression:
    npyramid_add: 4
    pyramid_downsample: 2
    thumbnail:
    thumbnail_scale: 1um

