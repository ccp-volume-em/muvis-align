general:
  overwrite: True
  logging:
    verbose: True
  output:
    format: ome.zarr

operations:
  - operation: convert
    input:
      path: data/*/*.tiff
      source_metadata:
        scale: {x: 0.032, y: 0.032}
        position: {y: 'fn[-3]*24', x: 'fn[-2]*24'}
    registration:
      pairing: orthogonal
      transform_type: affine
      method: sift
      gaussian_sigma: 2
      normalisation: True
      max_keypoints: 5000
      inlier_threshold_factor: 0.05
      max_trials: 1000
      ransac_iterations: 3
    output:
      path: ../../output/
