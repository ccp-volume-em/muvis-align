general:
  overwrite: True
  logging:
    verbose: True
  output:
    format: ome.zarr

operations:
  - operation: register
    input:
      path: D:/slides/Emb3_2x2_Mosaic_2CAMs/*.zarr
      source_metadata: source
    preprocessing:
      scale: 4
    registration:
      pairing: orthogonal
      transform_type: rigid
      method: cpd
      gaussian_sigma: 1
      normalisation: True
      max_keypoints: 5000
      inlier_threshold_factor: 0.05
      max_trials: 1000
      ransac_iterations: 3
      metrics: [ncc, ssim, onmi]
      n_parallel_pairwise_regs: 1
    output:
      path: stitched/
