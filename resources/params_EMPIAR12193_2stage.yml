  - operation: register stack3d
    input: /nemo/project/proj-ccp-vem/datasets/12193/data/S*/*.tiff
    #input:
    #  - /nemo/project/proj-ccp-vem/datasets/12193/data/S000/*.tiff
    #  - /nemo/project/proj-ccp-vem/datasets/12193/data/S001/*.tiff
