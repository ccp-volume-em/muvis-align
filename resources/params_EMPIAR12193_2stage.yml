    #input: D:/slides/12193/data_subset_small/S*/*.tiff
    source_metadata: {'scale': {'x': 0.004, 'y': 0.004, 'z': 0.1}, 'position': {'y':'fn[-3]*24', 'x':'fn[-2]*24', 'z':'S*0.1'}}
    extra_metadata: ../../aligned_stitched_mappings1.json
    scale: 8
    gaussian_sigma: 2
    flatfield_quantiles: [0.5]
    pairing: orthogonal
    transform_type: rigid
    groupwise_resolution_method: linear_two_pass
    registration:
      normalisation: True
      name: orb
      max_keypoints: 5000
      inlier_threshold_factor: 0.05
      max_trials: 1000
      ransac_iterations: 3
    n_parallel_pairwise_regs: 64
    output: ../../aligned2/
