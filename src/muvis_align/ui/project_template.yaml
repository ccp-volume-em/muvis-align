citations:
  - name: "muvis-align"
    license: "GPL 3"
    description: "Image registration"

docker_image:
  org: ccp-volume-em
  name: muvis-align
  tag: "1.0.0"
  platform: "linux/amd64"

inputs:
  - name: input_path
    type: image
    label: "Input data"
    description: "Input data"
    file_count: "multiple"
    unique_string:
      - "*"
    default: "data/*/*.zarr"
    cli_tag: "--input_path"
    cli_order: 0
    optional: False
    format:
      - tiff
      - ometiff
      - zarr
      - omezarr
    section_id: "input_output"
    folder_name: "/data"
    mode: "beginner"

outputs:
  - name: output_path
    type: image
    label: "Output data"
    description: "Output data"
    cli_tag: "--output_path"
    cli_order: 12
    default: "output/"
    optional: False
    format:
      - omezarr
    folder_name: "output/"
    file_count: "single"
    unique_string:
      - "*"
    section_id: "input_output"
    mode: "beginner"
    depth: True
    timepoints: True
    tiled: True
    pyramidal: True

parameters:
    # input_output
  - name: source_position_z
    type: textbox
    label: "Source position Z"
    description: "Metadata source for Z position"
    default: "source"
    cli_tag: "--source_position_z"
    cli_order: 1
    optional: True
    section_id: "input_output"
    mode: "advanced"
  - name: source_position_y
    type: textbox
    label: "Source position Y"
    description: "Metadata source for Y position"
    default: "source"
    cli_tag: "--source_position_y"
    cli_order: 2
    optional: True
    section_id: "input_output"
    mode: "advanced"
  - name: source_position_x
    type: textbox
    label: "Source position X"
    description: "Metadata source for X position"
    default: "source"
    cli_tag: "--source_position_x"
    cli_order: 3
    optional: True
    section_id: "input_output"
    mode: "advanced"
  - name: source_size_
    type: textbox
    label: "Source size Z"
    description: "Metadata source for Z size"
    default: "source"
    cli_tag: "--source_size_z"
    cli_order: 4
    optional: True
    section_id: "input_output"
    mode: "advanced"
  - name: source_size_y
    type: textbox
    label: "Source size Y"
    description: "Metadata source for Y size"
    default: "source"
    cli_tag: "--source_size_y"
    cli_order: 5
    optional: True
    section_id: "input_output"
    mode: "advanced"
  - name: source_size_x
    type: textbox
    label: "Source size X"
    description: "Metadata source for X size"
    default: "source"
    cli_tag: "--source_size_x"
    cli_order: 6
    optional: True
    section_id: "input_output"
    mode: "advanced"
  - name: source_rotation
    type: textbox
    label: "Source rotation"
    description: "Metadata source for rotation"
    default: "source"
    cli_tag: "--source_rotation"
    cli_order: 7
    optional: True
    section_id: "input_output"
    mode: "advanced"

  - name: preview_shapes
    type: checkbox
    label: "Preview shape data"
    description: "If enabled, tiles will be displayed as shapes"
    default: True
    cli_tag: "--preview_shapes"
    cli_order: 10
    optional: True
    append_value: False
    section_id: "input_output"
    mode: "beginner"
  - name: preview_images
    type: checkbox
    label: "Preview image data"
    description: "If enabled, tiles will be previewed as images"
    default: True
    cli_tag: "--preview_images"
    cli_order: 11
    optional: True
    append_value: False
    section_id: "input_output"
    mode: "beginner"
  - name: overwrite
    type: checkbox
    label: "Overwrite output data"
    description: "If enabled, any existing output data will be overwritten"
    default: True
    cli_tag: "--overwrite"
    cli_order: 13
    optional: True
    append_value: False
    section_id: "input_output"
    mode: "beginner"

    # registration / feature explorer
  - name: register
    type: textbox
    label: "Operation"
    description: "Operation (e.g. 'register', 'stack', '2d', '3d')"
    default: "register"
    cli_tag: "--register"
    cli_order: 0
    optional: True
    append_value: False
    section_id: "features"
    mode: "beginner"

  - name: flatfield_quantiles
    type: textbox
    label: "Flat-field quantiles"
    description: "One or two quantile values for flat-field correction, separated by comma (e.g. 0.5 or 0.01,0.99)"
    default: ""
    cli_tag: "--flatfield_quantiles"
    cli_order: 1
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: global_normalisation
    type: textbox
    label: "Global normalisation"
    description: "Normalisation method ('global' for global normalisation, any other value for regular normalisation)"
    default: "False"
    cli_tag: "--global_normalisation"
    cli_order: 2
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: global_gaussian_sigma
    type: float
    label: "Global Gaussian sigma"
    description: "Gaussian sigma for Global Gaussian filtering (value of 0 or empty for no filtering)"
    default:
    cli_tag: "--global_gaussian_sigma"
    cli_order: 3
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: filter_foreground
    type: checkbox
    label: "Filter foreground"
    description: "If enabled, filter tile images with low image signal (e.g. empty tiles)"
    default: False
    cli_tag: "--filter_foreground"
    cli_order: 4
    optional: True
    append_value: False
    section_id: "features"
    mode: "beginner"

  - name: channel
    type: textbox
    label: "Registration channel"
    description: "Channel to use for registration (name or index, e.g. 'DAPI' or '0')"
    default:
    cli_tag: "--channel"
    cli_order: 5
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: transform_type
    type: dropdown
    label: "Transform type"
    description: "Transform type for registration (translation, rigid, affine or similarity)"
    options:
      - label: Translation
        value: "translation"
      - label: Rigid
        value: "rigid"
      - label: Affine
        value: "affine"
      - label: Similarity
        value: "similarity"
    default: "rigid"
    cli_tag: "--transform_type"
    cli_order: 6
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: pairing
    type: dropdown
    label: "Pairing"
    description: "Pairing method: use orthogonal to avoid diagonal / very small overlaps, use overlay for stack-like overlaps. Default uses MVS default pairing method"
    options:
      - label: Default
        value: "default"
      - label: Orthogonal
        value: "orthogonal"
      - label: Overlay
        value: "overlay"
    default: "False"
    cli_tag: "--pairing"
    cli_order: 7
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: method
    type: dropdown
    label: "Transform type"
    description: "Transform type for registration (translation, rigid, affine or similarity)"
    options:
      - label: Phase correlation
        value: "phase_correlation"
      - label: SIFT
        value: "sift"
      - label: ORB
        value: "orb"
      - label: CPD
        value: "cpd"
      - label: ANTs
        value: "ants"
    default: "phase_correlation"
    cli_tag: "--method"
    cli_order: 8
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: normalisation
    type: checkbox
    label: "Normalisation"
    description: "If enabled, normalise overlaps in registration function"
    default: True
    cli_tag: "--normalisation"
    cli_order: 9
    optional: True
    append_value: False
    section_id: "features"
    mode: "beginner"
  - name: gaussian_sigma
    type: float
    label: "Gaussian sigma"
    description: "Gaussian sigma for Gaussian filtering of overlaps (value of 0 or empty for no filtering)"
    default:
    cli_tag: "--gaussian_sigma"
    cli_order: 10
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: max_keypoints
    type: integer
    label: "Max keypoints"
    description: "Maximum keypoints for feature-based registration methods like SIFT and ORB"
    default: 5000
    cli_tag: "--max_keypoints"
    cli_order: 11
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: inlier_threshold_factor
    type: float
    label: "Inlier threshold factor"
    description: "Inlier threshold factor for RANSAC in feature-based registration methods, relative value (0...1)"
    default: 0.05
    cli_tag: "--max_keypoints"
    cli_order: 12
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: max_trials
    type: integer
    label: "Max RANSAC trials"
    description: "Maximum RANSAC trials for feature-based registration methods"
    default: 1000
    cli_tag: "--max_trials"
    cli_order: 13
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: ransac_iterations
    type: integer
    label: "RANSAC iterations"
    description: "Number of RANSAC iterations for feature-based registration methods"
    default: 3
    cli_tag: "--ransac_iterations"
    cli_order: 14
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: n_parallel_pairwise_regs
    type: integer
    label: "Threads"
    description: "Number of parallel threads for pairwise registrations (0 / blank for automatic detection)"
    default:
    cli_tag: "--n_parallel_pairwise_regs"
    cli_order: 15
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: reg_preview_image1
    type: dropdown
    label: "Registration preview image 1"
    description: "Select image for registration preview"
    default:
    cli_tag: "--reg_preview_image1"
    cli_order: 16
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: reg_preview_image2
    type: dropdown
    label: "Registration preview image 2"
    description: "Select image for registration preview"
    default:
    cli_tag: "--reg_preview_image2"
    cli_order: 17
    optional: True
    section_id: "features"
    mode: "beginner"
  - name: preview_registration
    type: pushbutton
    label: "Preview"
    description: "Preview registration"
    cli_order: 19
    section_id: "features"
    mode: "beginner"

display_only:
  - name: coordinate_system
    type: dropdown
    label: "Select coordinate system"
    description: "Select coordinate system to preview"
    options:
      - label: Source metadata
        value: "source_metadata"
    default: "source_metadata"
    section_id: "input_output"
    cli_order: 8
  - name: metadata_table
    type: table
    label: " "
    default: []
    description: "Metadata"
    section_id: "input_output"
    cli_order: 9

  - name: metrics_table
    type: table
    label: " "
    default: []
    description: "Metrics"
    section_id: "features"
    cli_order: 18
